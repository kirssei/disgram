name: Build & Release

on:
  push:
    tags:
      - "v*"
    branches:
      - gui-go
  workflow_dispatch:

jobs:
  build-internal:
    strategy:
      matrix:
        include:

          # Windows
          - os: windows-latest
            name: windows
            python-url: "https://www.python.org/ftp/python/3.12.5/python-3.12.5-embed-amd64.zip"
            python-archive: python.zip

          # Linux
          - os: ubuntu-latest
            name: linux
            python-url: "https://github.com/astral-sh/python-build-standalone/releases/download/20240814/cpython-3.12.5+20240814-x86_64-unknown-linux-gnu-install_only.tar.gz"
            python-archive: python.tar.gz

          # macOS Apple Silicon
          - os: macos-14
            name: macos-arm64
            python-url: "https://github.com/astral-sh/python-build-standalone/releases/download/20240814/cpython-3.12.5+20240814-aarch64-apple-darwin-install_only.tar.gz"
            python-archive: python.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python for Poetry
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        shell: bash
        run: |
          pip install poetry
          poetry self add poetry-plugin-export

      - name: Export dependencies from pyproject.toml
        shell: bash
        run: |
          poetry export \
            --without-hashes \
            -f requirements.txt \
            -o requirements.txt

      - name: Download portable Python
        shell: bash
        run: curl -L -o ${{ matrix.python-archive }} "${{ matrix.python-url }}"

      - name: Extract portable Python
        shell: bash
        run: |
          mkdir -p _internal/python
          if [[ "${{ matrix.python-archive }}" == *.zip ]]; then
            unzip -q ${{ matrix.python-archive }} -d _internal/python
          else
            # --strip-components=1 убирает верхнюю папку внутри архива
            tar -xzf ${{ matrix.python-archive }} -C _internal/python --strip-components=1
          fi

      - name: Bootstrap pip (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          PTH_FILE=$(ls _internal/python/python3*.pth 2>/dev/null | head -1)
          cat >> "$PTH_FILE" << 'EOF'
          import site
          ../site-packages
          ..
          EOF

          curl -L -o get-pip.py https://bootstrap.pypa.io/get-pip.py
          _internal/python/python.exe get-pip.py --no-warn-script-location --quiet

      - name: Install dependencies into _internal/site-packages
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            PYTHON="_internal/python/python.exe"
            TARGET="_internal/python/Lib/site-packages"
          else
            PYTHON="_internal/python/bin/python3"
            TARGET="_internal/site-packages"
          fi

          mkdir -p "$TARGET"

          $PYTHON -m pip install \
            --target "$TARGET" \
            --requirement requirements.txt \
            --quiet

          $PYTHON -m pip install \
            --target "$TARGET" \
            "py-cord==2.6.1" \
            --upgrade \
            --quiet

      - name: Copy project scripts
        shell: bash
        run: |
          cp disgram.py _internal/
          cp -r modules  _internal/

      - name: Upload _internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-${{ matrix.name }}
          path: _internal/


  build-gui:
    needs: build-internal

    strategy:
      matrix:
        include:

          - os: ubuntu-latest
            platform: linux/amd64
            internal-artifact: internal-linux
            binary-name: disgram
            archive-name: disgram-linux-amd64
            archive-ext: tar.gz

          - os: windows-latest
            platform: windows/amd64
            internal-artifact: internal-windows
            binary-name: disgram.exe
            archive-name: disgram-windows-amd64
            archive-ext: zip

          - os: macos-14
            platform: darwin/universal
            binary-name: disgram
            archive-name: disgram-macos
            archive-ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Download _internal (Linux / Windows)
        if: matrix.os != 'macos-14'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.internal-artifact }}
          path: release/_internal/

      - name: Download _internal arm64 (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/download-artifact@v4
        with:
          name: internal-macos-arm64
          path: release/_internal/

      - name: Restore execute permissions (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x release/_internal/python/bin/python3

      - name: Build Wails app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: gui
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41 -o ${{ matrix.binary-name }}

      - name: Build Wails app (non-Linux)
        if: matrix.os != 'ubuntu-latest'
        working-directory: gui
        run: wails build -platform ${{ matrix.platform }} -o ${{ matrix.binary-name }}

      - name: Package release archive
        shell: bash
        run: |
          DIST_DIR="dist/${{ matrix.archive-name }}"
          mkdir -p "$DIST_DIR"

          if [[ "${{ matrix.os }}" == "macos-14" ]]; then
            cp -r gui/build/bin/*.app "$DIST_DIR/"
            APP_NAME=$(ls "$DIST_DIR" | grep ".app")
            cp -r release/_internal "$DIST_DIR/$APP_NAME/Contents/"
          else
            cp gui/build/bin/${{ matrix.binary-name }} "$DIST_DIR/"
            cp -r release/_internal "$DIST_DIR/"
          fi

          cd dist
          if [[ "${{ matrix.archive-ext }}" == "zip" ]]; then
            7z a "${{ matrix.archive-name }}.zip" "${{ matrix.archive-name }}/"
          else
            tar -czf "${{ matrix.archive-name }}.tar.gz" "${{ matrix.archive-name }}/"
          fi

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: dist/${{ matrix.archive-name }}.${{ matrix.archive-ext }}

  publish-release:
    needs: build-gui
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all release archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: "disgram-*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Disgram ${{ github.ref_name }}"
          body: |
            ## Установка

            1. Скачай архив под свою платформу
            2. Распакуй
            3. Запусти `disgram` (или `disgram.exe` на Windows)

            Python и все зависимости уже внутри дополнительно ничего устанавливать не нужно.

            ## Платформы
            | Файл | Платформа |
            |------|-----------|
            | `disgram-linux-amd64.tar.gz` | Linux x86_64 |
            | `disgram-windows-amd64.zip` | Windows x64 |
            | `disgram-macos.tar.gz` | macOS (Intel + Apple Silicon) |
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}